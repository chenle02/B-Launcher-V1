<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>B-Launcher V1</title><style>body{margin:0;background:#07131e;color:white;font-family:system-ui}.app{min-height:100vh;padding:20px;background:radial-gradient(circle at top,#164b73,#07131e 45%,#03070d)}h1{font-size:28px}.lens{margin:30px auto;width:120px;height:120px;border:12px solid #0b84ff;border-radius:50%;position:relative;box-shadow:0 0 30px #0b84ff;animation:p 1.6s infinite}.lens:after{content:"";position:absolute;width:55px;height:16px;border-radius:99px;background:#50ff9d;right:-45px;bottom:4px;transform:rotate(45deg)}@keyframes p{50%{transform:scale(1.08)}}input{width:100%;padding:14px;border-radius:18px;border:1px solid #37556b;background:#132838;color:white;font-size:17px}.card{margin:10px 0;background:rgba(255,255,255,.1);border-radius:20px;padding:15px;font-weight:900}.small{font-size:11px;color:#a8c7d9;word-break:break-all}.section{color:#a8c7d9;font-weight:900;margin-top:16px}.bar{position:fixed;left:10px;right:10px;bottom:10px;display:flex;gap:8px;overflow:auto}.btn{border:0;border-radius:99px;padding:12px;background:#0b84ff;color:white;font-weight:900;white-space:nowrap}</style></head><body><div class="app"><h1>B-Launcher V1</h1><div id="sub">Blue magnifying glass launcher</div><div class="lens"></div><input id="q" placeholder="Search all phone apps" oninput="render()"><div id="list"></div><div class="bar"><button class="btn" onclick="reloadApps()">Reload</button><button class="btn" onclick="openId('map')">B-Map</button><button class="btn" onclick="openId('notes')">B-Notes</button><button class="btn" onclick="openId('translate')">B-Translate</button></div></div><script>const b=[{id:'map',t:'B-Map V1',d:'Maps',p:'com.chenboda01.bmapv2osflow96',c:'com.chenboda01.bmapv2osflow96.MainActivity'},{id:'notes',t:'B-Notes V1',d:'Notes',p:'com.chenboda01.bnotesv1',c:'com.chenboda01.bnotesv1.MainActivity'},{id:'translate',t:'B-Translate V1',d:'Translate',p:'com.chenboda01.btranslatev1',c:'com.chenboda01.btranslatev1.MainActivity'}];let a=[];function reloadApps(){try{a=JSON.parse(AndroidBridge.getInstalledApps()||'[]').map(x=>({t:x.title,d:x.desc||x.pkg,p:x.pkg,c:x.cls})).filter(x=>!b.some(y=>y.p===x.p))}catch(e){a=[]}document.getElementById('sub').textContent='Found '+(a.length+b.length)+' apps';render()}function openA(x){AndroidBridge.openApp(x.p,x.c,x.t)}function openId(id){openA(b.find(x=>x.id===id))}function card(x){let d=document.createElement('div');d.className='card';d.onclick=()=>openA(x);d.innerHTML=x.t+'<div class="small">'+(x.d||x.p)+'</div>';return d}function sec(s){let d=document.createElement('div');d.className='section';d.textContent=s;return d}function hit(x,q){return(x.t+' '+x.d+' '+x.p).toLowerCase().includes(q)}function render(){let q=document.getElementById('q').value.toLowerCase(),l=document.getElementById('list');l.innerHTML='';let bb=b.filter(x=>hit(x,q)),aa=a.filter(x=>hit(x,q));if(bb.length){l.appendChild(sec('B Apps'));bb.forEach(x=>l.appendChild(card(x)))}if(aa.length){l.appendChild(sec('Phone Apps'));aa.forEach(x=>l.appendChild(card(x)))}if(!bb.length&&!aa.length)l.innerHTML='<div class="section">No app found</div>'}window.blauncherBack=function(){document.getElementById('q').value='';render()};reloadApps();</script></body></html>
