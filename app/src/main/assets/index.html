<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>B-Launcher V1</title><style>body{margin:0;background:#07131e;color:white;font-family:system-ui}.app{min-height:100vh;padding:20px;background:radial-gradient(circle at top,#164b73,#07131e 45%,#03070d)}h1{font-size:28px}.lens{margin:35px auto;width:130px;height:130px;border:12px solid #0b84ff;border-radius:50%;position:relative;box-shadow:0 0 30px #0b84ff;animation:p 1.6s infinite}.lens:after{content:"";position:absolute;width:58px;height:16px;border-radius:99px;background:#50ff9d;right:-48px;bottom:4px;transform:rotate(45deg)}@keyframes p{50%{transform:scale(1.08)}}input{width:100%;padding:14px;border-radius:18px;border:1px solid #37556b;background:#132838;color:white;font-size:17px}.card{margin:12px 0;background:rgba(255,255,255,.1);border-radius:22px;padding:20px;font-weight:900}.bar{position:fixed;left:10px;right:10px;bottom:10px;display:flex;gap:8px}.btn{border:0;border-radius:99px;padding:12px;background:#0b84ff;color:white;font-weight:900}</style></head><body><div class="app"><h1>B-Launcher V1</h1><div>Blue magnifying glass launcher</div><div class="lens"></div><input id="q" placeholder="Search B apps" oninput="render()"><div id="list"></div><div class="bar"><button class="btn" onclick="openMap()">B-Map</button><button class="btn" onclick="openNotes()">B-Notes</button><button class="btn" onclick="openTranslate()">B-Translate</button></div></div><script>const apps=[['B-Map V1','com.chenboda01.bmapv2osflow96','com.chenboda01.bmapv2osflow96.MainActivity'],['B-Notes V1','com.chenboda01.bnotesv1','com.chenboda01.bnotesv1.MainActivity'],['B-Translate V1','com.chenboda01.btranslatev1','com.chenboda01.btranslatev1.MainActivity']];function openA(a){AndroidBridge.openApp(a[1],a[2],a[0])}function openMap(){openA(apps[0])}function openNotes(){openA(apps[1])}function openTranslate(){openA(apps[2])}function render(){let q=document.getElementById('q').value.toLowerCase(),l=document.getElementById('list');l.innerHTML='';apps.filter(a=>a[0].toLowerCase().includes(q)).forEach(a=>{let d=document.createElement('div');d.className='card';d.textContent=a[0];d.onclick=()=>openA(a);l.appendChild(d)})}render();</script></body></html>
